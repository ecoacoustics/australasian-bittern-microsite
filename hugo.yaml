baseURL: "https://example.org/"
languageCode: "en-us"
title: "Eavesdropping on Wetland Birds"
theme: "microsite-template"
server:
  headers:
    - for: /**
      values:
        Access-Control-Allow-Origin: "*"
        Cross-Origin-Opener-Policy: same-origin
        Cross-Origin-Embedder-Policy: require-corp
        Cross-Origin-Resource-Policy: cross-origin
        Content-Security-Policy-Report-Only: "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' data: https://*.ecosounds.org https://*.acousticobservatory.org https://cdn.jsdelivr.net https://www.google-analytics.com; media-src 'self' https://*.ecosounds.org https://*.acousticobservatory.org; frame-src 'none'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"

        ignoreLogs:
          - warning-goldmark-raw-html
module:
  hugoVersion:
    extended: true
    min: 0.125.0
markup:
  goldmark:
    renderer:
      unsafe: true
menus:
  main:
    - name: About
      pageRef: https://eavesdroppingonwetlandbirds.com.au/
      weight: 10
  Footer:
    - name: Project Home
      pageRef: https://eavesdroppingonwetlandbirds.com.au/
    - name: Ecosounds Project
      pageRef: https://www.ecosounds.org/projects/1131
    - name: Support / Donate
      pageRef: https://www.csu.edu.au/office/advancement/giving-to-csu/active-funds/eavesdropping-on-wetland-birds
    - name: Blog
      pageRef: https://eavesdroppingonwetlandbirds.com.au/category/blog/
params:
  api_host: https://api.ecosounds.org
  workbench_host: https://ecosounds.org
  hero_image: images/hero_image.jpg
  campaigns:
    - name: "Australasian Bittern"
      filters:
        filter:
          and:
            - tags.id:
                in:
                  - 1068
            - projects.id:
                eq: 1131

  style:
    roundedButtons: false
    # Theme colors are defined using "hsl" (hue, saturation, lightness).
    # To create your own hsl theme color, you can use the following website.
    # https://hslpicker.com/#e9e61f
    themeColor:
      hue: 59deg
      saturation: 82.1%
      lightness: 51.8%
    themeShades:
      "50": rgb(251 250 212)
      "100": rgb(249 248 194)
      "200": rgb(247 245 170)
      "300": rgb(242 240 124)
      "400": rgb(238 235 78)
      "500": rgb(235 232 54)
      "600": rgb(233 231 31)
      "700": rgb(194 191 19)
      "800": rgb(148 145 15)
      "900": rgb(101 100 10)
      "950": rgb(50 49 5)
